name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm run build
      - name: Deploy to Firebase Hosting
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_VETSYSTEM_B7675 }}' > /tmp/firebase-sa.json
          npx firebase-tools deploy --only hosting --project vetsystem-b7675 || \
            echo "Deploy skipped — version already active"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
