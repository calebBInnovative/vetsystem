name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm run build
      - name: Deploy preview channel
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_VETSYSTEM_B7675 }}' > /tmp/firebase-sa.json
          npx firebase-tools hosting:channel:deploy pr-${{ github.event.number }} \
            --project vetsystem-b7675 --expires 7d || \
            echo "Preview deploy skipped"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
